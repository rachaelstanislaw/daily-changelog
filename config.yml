version: 2.1

# ---------------------------------------------------------------------------
# Changelog bot pipeline
# Runs daily at 17:00 UTC and pushes new entries to the Confluence changelog.
# All secrets are stored as CircleCI project environment variables.
# ---------------------------------------------------------------------------

orbs:
  python: circleci/python@2.1.1

# ---------------------------------------------------------------------------
# Jobs
# ---------------------------------------------------------------------------

jobs:
  update-changelog:
    executor:
      name: python/default
      tag: "3.12"
    steps:
      - checkout

      - python/install-packages:
          pkg-manager: pip
          pip-dependency-file: requirements.txt

      - run:
          name: Run changelog update bot
          command: python update_changelog.py
          # Expose all required secrets from CircleCI project env vars.
          # Never hard-code values here — set them in Project Settings → Env Vars.
          environment:
            CONFLUENCE_BASE_URL:   $CONFLUENCE_BASE_URL
            CONFLUENCE_EMAIL:      $CONFLUENCE_EMAIL
            CONFLUENCE_API_TOKEN:  $CONFLUENCE_API_TOKEN
            JIRA_BASE_URL:         $JIRA_BASE_URL
            JIRA_EMAIL:            $JIRA_EMAIL
            JIRA_API_TOKEN:        $JIRA_API_TOKEN
            LINEAR_API_KEY:        $LINEAR_API_KEY
            SLACK_BOT_TOKEN:       $SLACK_BOT_TOKEN
            ANTHROPIC_API_KEY:     $ANTHROPIC_API_KEY
            # Optional: override how far back to search (default: 26h, gives buffer overlap)
            LOOKBACK_HOURS:        "26"

      - store_artifacts:
          path: /tmp/changelog-bot.log
          destination: changelog-bot-run-log

# ---------------------------------------------------------------------------
# Workflows
# ---------------------------------------------------------------------------

workflows:
  # Manual / on-push run (useful for testing the pipeline itself)
  on-push:
    jobs:
      - update-changelog:
          filters:
            branches:
              only: main

  # Daily scheduled run — 17:00 UTC
  daily-changelog-update:
    triggers:
      - schedule:
          cron: "0 17 * * *"
          filters:
            branches:
              only: main
    jobs:
      - update-changelog
